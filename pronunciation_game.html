<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 小朋友發音練習遊戲</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Noto Sans HK', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 30px;
    padding: 30px;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    font-size: 2em;
    color: #5a3e8f;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 20px;
    font-size: 0.95em;
  }
  .lang-tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .lang-tab {
    padding: 10px 28px;
    border-radius: 25px;
    border: 2px solid #5a3e8f;
    background: white;
    color: #5a3e8f;
    font-size: 1em;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  .lang-tab.active {
    background: #5a3e8f;
    color: white;
  }
  .sentence-box {
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .sentence-label {
    font-size: 0.8em;
    color: #a0522d;
    margin-bottom: 6px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .sentence-text {
    font-size: 2em;
    font-weight: bold;
    color: #333;
    line-height: 1.4;
    letter-spacing: 2px;
  }
  .sentence-hint {
    font-size: 0.85em;
    color: #888;
    margin-top: 8px;
    font-style: italic;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 14px 28px;
    border-radius: 50px;
    border: none;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-new {
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    color: #444;
  }
  .btn-speak {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
  }
  .btn-record {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    font-size: 1.1em;
    padding: 16px 36px;
  }
  .btn-record.recording {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,50,50,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(220,50,50,0); }
  }
  .result-box {
    background: #f0f8ff;
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 20px;
    min-height: 80px;
    border: 2px dashed #b0cfe8;
  }
  .result-label {
    font-size: 0.8em;
    color: #4a90d9;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .result-text {
    font-size: 1.3em;
    color: #333;
    min-height: 32px;
    font-weight: bold;
  }
  .feedback-box {
    text-align: center;
    min-height: 60px;
    margin-bottom: 16px;
  }
  .feedback-emoji {
    font-size: 3.5em;
    display: block;
  }
  .feedback-msg {
    font-size: 1.1em;
    font-weight: bold;
    margin-top: 4px;
  }
  .feedback-good { color: #22aa44; }
  .feedback-try { color: #e67e22; }
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f8f8f8;
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 0.95em;
    color: #666;
  }
  .score-val {
    font-weight: bold;
    color: #5a3e8f;
    font-size: 1.1em;
  }
  .stars {
    font-size: 1.4em;
    letter-spacing: 2px;
  }
  .status-msg {
    text-align: center;
    color: #e74c3c;
    font-size: 0.85em;
    margin-top: 8px;
    min-height: 20px;
  }
  .mic-indicator {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #ccc;
    display: inline-block;
    margin-right: 6px;
  }
  .mic-indicator.active { background: #ff4444; animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>
<div class="container">
  <h1>🎤 小朋友發音練習</h1>
  <p class="subtitle">跟住讀出句子，考考你的發音！</p>

  <div class="lang-tabs">
    <button class="lang-tab active" onclick="setLang('zh')" id="tab-zh">🇭🇰 中文</button>
    <button class="lang-tab" onclick="setLang('en')" id="tab-en">🇬🇧 English</button>
  </div>

  <div class="sentence-box">
    <div class="sentence-label">📖 請跟住讀</div>
    <div class="sentence-text" id="sentence-display">按「新句子」開始！</div>
    <div class="sentence-hint" id="sentence-hint"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-new" onclick="newSentence()">🎲 新句子</button>
    <button class="btn btn-speak" onclick="speakSentence()">🔊 聆聽示範</button>
  </div>

  <div style="text-align:center; margin-bottom:16px;">
    <button class="btn btn-record" id="record-btn" onclick="toggleRecord()">
      <span class="mic-indicator" id="mic-dot"></span>
      <span id="record-label">🎙️ 按一下錄音</span>
    </button>
    <div class="status-msg" id="status-msg">請先按「新句子」選一句話</div>
  </div>

  <div class="result-box">
    <div class="result-label">🗣️ 你說了什麼</div>
    <div class="result-text" id="result-text">（等待錄音...）</div>
  </div>

  <div class="feedback-box" id="feedback-box"></div>

  <div class="score-bar">
    <span>今日得分：</span>
    <span class="score-val" id="score-display">0</span>
    <span class="stars" id="stars-display">⭐⭐⭐⭐⭐</span>
    <span>練習次數：<b id="attempts-display">0</b></span>
  </div>
</div>

<script>
const sentences = {
  zh: [
    { text: "我愛爸爸媽媽。", hint: "wǒ ài bàba māma" },
    { text: "今天天氣很好。", hint: "jīntiān tiānqì hěn hǎo" },
    { text: "我要喝水。", hint: "wǒ yào hē shuǐ" },
    { text: "小狗在跑。", hint: "xiǎo gǒu zài pǎo" },
    { text: "我喜歡吃蘋果。", hint: "wǒ xǐhuān chī píngguǒ" },
    { text: "貓咪很可愛。", hint: "māomī hěn kě'ài" },
    { text: "我去學校讀書。", hint: "wǒ qù xuéxiào dúshū" },
    { text: "今天我很開心。", hint: "jīntiān wǒ hěn kāixīn" },
    { text: "我的書包很重。", hint: "wǒ de shūbāo hěn zhòng" },
    { text: "姐姐在唱歌。", hint: "jiějiě zài chànggē" },
    { text: "我想玩積木。", hint: "wǒ xiǎng wán jīmù" },
    { text: "蝴蝶飛來了。", hint: "húdié fēi lái le" },
  ],
  en: [
    { text: "I love my family.", hint: "ī luhv maī fam-uh-lee" },
    { text: "The cat is sleeping.", hint: "Thuh kat iz slee-ping" },
    { text: "I want some water.", hint: "Ī wont sum waw-ter" },
    { text: "The sun is shining.", hint: "Thuh sun iz shī-ning" },
    { text: "I like to play outside.", hint: "Ī līk too play owt-sīd" },
    { text: "My dog is very cute.", hint: "Maī dog iz veh-ree kyoot" },
    { text: "I go to school every day.", hint: "Ī goh too skool ev-ree day" },
    { text: "Today is a happy day.", hint: "Too-day iz uh hap-ee day" },
    { text: "I can count to ten.", hint: "Ī kan kownt too ten" },
    { text: "The bird is singing.", hint: "Thuh burd iz sing-ing" },
    { text: "I brush my teeth at night.", hint: "Ī brush maī teeth at nīt" },
    { text: "Flowers are beautiful.", hint: "Flow-erz ar byoo-tuh-ful" },
  ]
};

let currentLang = 'zh';
let currentSentence = null;
let recognition = null;
let isRecording = false;
let score = 0;
let attempts = 0;

function setLang(lang) {
  currentLang = lang;
  document.getElementById('tab-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('tab-en').classList.toggle('active', lang === 'en');
  currentSentence = null;
  document.getElementById('sentence-display').textContent = '按「新句子」開始！';
  document.getElementById('sentence-hint').textContent = '';
  document.getElementById('result-text').textContent = '（等待錄音...）';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('status-msg').textContent = '請先按「新句子」選一句話';
}

function newSentence() {
  const list = sentences[currentLang];
  const pick = list[Math.floor(Math.random() * list.length)];
  currentSentence = pick;
  document.getElementById('sentence-display').textContent = pick.text;
  document.getElementById('sentence-hint').textContent = pick.hint;
  document.getElementById('result-text').textContent = '（等待錄音...）';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('status-msg').textContent = '準備好了！按「錄音」跟住讀吧！';
}

function speakSentence() {
  if (!currentSentence) { alert('請先按「新句子」！'); return; }
  const utter = new SpeechSynthesisUtterance(currentSentence.text);
  utter.lang = currentLang === 'zh' ? 'zh-HK' : 'en-US';
  utter.rate = 0.8;
  utter.pitch = 1.1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function toggleRecord() {
  if (!currentSentence) { alert('請先按「新句子」！'); return; }
  if (isRecording) {
    stopRecord();
  } else {
    startRecord();
  }
}

function startRecord() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('status-msg').textContent = '⚠️ 你的瀏覽器不支援語音辨識，請用 Chrome 瀏覽器';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = currentLang === 'zh' ? 'zh-HK' : 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  recognition.continuous = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('record-btn').classList.add('recording');
    document.getElementById('record-label').textContent = '⏹️ 停止錄音';
    document.getElementById('mic-dot').classList.add('active');
    document.getElementById('status-msg').textContent = '🔴 正在錄音，請讀出句子...';
    document.getElementById('result-text').textContent = '（聆聽中...）';
  };

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }
    document.getElementById('result-text').textContent = final || interim || '（處理中...）';
    if (final) evaluateResult(final.trim());
  };

  recognition.onerror = (e) => {
    document.getElementById('status-msg').textContent = '⚠️ 錯誤：' + e.error + '（請允許麥克風權限）';
    stopRecord();
  };

  recognition.onend = () => {
    stopRecord();
  };

  recognition.start();
}

function stopRecord() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('record-label').textContent = '🎙️ 按住錄音';
  document.getElementById('mic-dot').classList.remove('active');
  document.getElementById('status-msg').textContent = '錄音完畢！';
}

function normalize(str) {
  return str.replace(/[，。！？,.!?\s\u3000]/g, '').toLowerCase();
}

function evaluateResult(spoken) {
  if (!currentSentence) return;
  attempts++;
  document.getElementById('attempts-display').textContent = attempts;

  const target = normalize(currentSentence.text);
  const spokenN = normalize(spoken);

  // similarity: count matching chars
  let matched = 0;
  const targetChars = target.split('');
  const spokenChars = [...spokenN];
  const used = new Array(spokenChars.length).fill(false);
  for (let c of targetChars) {
    const idx = spokenChars.findIndex((s, i) => !used[i] && s === c);
    if (idx !== -1) { matched++; used[idx] = true; }
  }
  const similarity = matched / Math.max(targetChars.length, 1);

  let emoji, msg, cls, pts;
  if (similarity >= 0.85) {
    emoji = '🌟'; msg = '非常棒！說得很準確！'; cls = 'feedback-good'; pts = 3;
  } else if (similarity >= 0.6) {
    emoji = '😊'; msg = '很好！再試一次會更完美！'; cls = 'feedback-try'; pts = 1;
  } else if (similarity >= 0.35) {
    emoji = '🙂'; msg = '加油！跟住示範再練習！'; cls = 'feedback-try'; pts = 0;
  } else {
    emoji = '💪'; msg = '繼續努力！先聽示範再讀！'; cls = 'feedback-try'; pts = 0;
  }

  score += pts;
  document.getElementById('score-display').textContent = score;
  updateStars();

  document.getElementById('feedback-box').innerHTML = `
    <span class="feedback-emoji">${emoji}</span>
    <div class="feedback-msg ${cls}">${msg}</div>
    <div style="font-size:0.85em;color:#999;margin-top:4px;">相似度：${Math.round(similarity*100)}%</div>
  `;

  // Auto speak correct answer
  if (similarity < 0.85) {
    setTimeout(() => speakSentence(), 800);
  }
}

function updateStars() {
  const s = Math.min(5, Math.floor(score / 3));
  document.getElementById('stars-display').textContent = '⭐'.repeat(s) + '☆'.repeat(5 - s);
}
</script>
</body>
</html>
